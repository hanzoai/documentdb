---
# https://nfpm.goreleaser.com/configuration/

name: docdb
arch: ${PACKAGE_ARCH}
platform: linux
version: ${PACKAGE_VERSION}
section: database
maintainer: packages@docdb.io
description: A truly Open Source MongoDB alternative
homepage: https://www.docdb.hanzo.ai/
license: Apache License 2.0

# https://www.debian.org/doc/debian-policy/ch-relationships.html#binary-dependencies-depends-recommends-suggests-enhances-pre-depends
# https://rpm-software-management.github.io/rpm/manual/dependencies.html#weak-dependencies
suggests:
  - postgresql

contents:
  - src: tmp/build/linux_${DIR_ARCH}/docdb
    dst: /usr/bin/docdb
    expand: true
  - src: build/docdb.service
    dst: /etc/systemd/system/docdb.service
